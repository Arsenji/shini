services:
  - type: web
    name: shini
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: VK_TOKEN
        sync: false
      - key: VK_GROUP_ID
        value: "237597670"
      - key: VK_PEER_ID
        sync: false
      - key: VK_API_VERSION
        value: "5.199"
      - key: CORS_ORIGINS
        value: https://shini-1.onrender.com
      - key: SITE_URL
        value: https://shini-1.onrender.com
