services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shini
      POSTGRES_PASSWORD: shini
      POSTGRES_DB: shini
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shini -d shini"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://shini:shini@postgres:5432/shini
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
